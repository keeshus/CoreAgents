services:
  postgres:
    image: postgres:17-alpine
    container_name: core-agents-db
    # Remove port mapping for production to avoid direct DB access
    ports:
      - "5432:5432"
    environment:
      # WARNING: Change these credentials for any non-local deployment
      POSTGRES_USER: coreagents
      POSTGRES_PASSWORD: coreagents
      POSTGRES_DB: coreagents
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U coreagents
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.18.0
    container_name: core-agents-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  backend:
    container_name: core-agents-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PORT=3001
      - DATABASE_URL=postgres://coreagents:coreagents@postgres:5432/coreagents
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
    restart: always

  valkey:
    image: valkey/valkey:7-alpine
    container_name: core-agents-valkey
    ports:
      - "6379:6379"
    command: valkey-server --requirepass ${VALKEY_PASSWORD:-dev-valkey}
    restart: always

  worker:
    container_name: core-agents-worker
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: always
    environment:
      - VALKEY_HOST=valkey
      - VALKEY_PASSWORD=${VALKEY_PASSWORD:-dev-valkey}
    depends_on:
      - valkey

  frontend:
    container_name: core-agents-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_TELEMETRY_DISABLED=1
    restart: always

volumes:
  pgdata:
  qdrant_data:
