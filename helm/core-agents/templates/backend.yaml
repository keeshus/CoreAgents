apiVersion: v1
kind: Service
metadata:
  name: {{ include "core-agents.fullname" . }}-backend
  labels:
    {{- include "core-agents.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.backendPort }}
      targetPort: {{ .Values.backend.port }}
      protocol: TCP
      name: http
  selector:
    app: {{ include "core-agents.fullname" . }}-backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "core-agents.fullname" . }}-backend
  labels:
    {{- include "core-agents.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "core-agents.fullname" . }}-backend
  template:
    metadata:
      labels:
        app: {{ include "core-agents.fullname" . }}-backend
    spec:
      volumes:
        - name: flow-data
          emptyDir: {}
      initContainers:
        - name: migrate
          image: "{{ .Values.image.repository }}-backend:{{ .Values.image.tag }}"
          command: ["sh", "-c"]
          args:
            - |
              echo "Running database migrations..."
              # Run migrations via the backend's migrate script
              cd /app && node backend/dist/db/migrate.js
          envFrom:
            - secretRef:
                name: {{ include "core-agents.fullname" . }}-secret
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}-backend:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            - name: PORT
              value: {{ .Values.backend.port | quote }}
            - name: SIDECAR_URL
              value: "http://localhost:4001"
          envFrom:
            - secretRef:
                name: {{ include "core-agents.fullname" . }}-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
        - name: sidecar
          image: "{{ .Values.image.repository }}-sidecar:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 4001
              name: sidecar
          args: ["--ttl-hours=168"]
          volumeMounts:
            - name: flow-data
              mountPath: /var/flow-data
          securityContext:
            readOnlyRootFilesystem: true
            runAsUser: 1001
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.sidecar.resources | nindent 12 }}
