apiVersion: v1
kind: Secret
metadata:
  name: {{ include "core-agents.fullname" . }}-secret
  labels:
    {{- include "core-agents.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ include "core-agents.databaseUrl" . | quote }}
  anthropic-api-key: {{ .Values.anthropicApiKey | quote }}
  openai-api-key: {{ .Values.openaiApiKey | quote }}
