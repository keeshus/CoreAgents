apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "core-agents.fullname" . }}-config
  labels:
    {{- include "core-agents.labels" . | nindent 4 }}
data:
  frontend-api-url: {{ .Values.frontend.apiUrl | default (printf "http://%s-backend:%d/api" (include "core-agents.fullname" .) (int .Values.backend.port)) | quote }}
